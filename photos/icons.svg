<?xml version="1.0" encoding="UTF-8"?>
<!--
    CFSBR Custom Icon System
    Stroke 2px, geometric monoline, 24x24 viewBox unless noted.
    Color inherits from `currentColor` so a parent `color:` rule paints them.
    Usage: <svg class="cfsbr-icon" aria-hidden="true"><use href="photos/icons.svg#ic-target"/></svg>
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>

    <!-- ============================== MONOGRAM ============================== -->
    <!-- CFSBR mark: stacked "C" arcs enclosing a network node grid.
         64x64 base, used in hero, favicon-able. -->
    <symbol id="ic-mark" viewBox="0 0 64 64">
      <!-- Outer C arc -->
      <path d="M52 18 A22 22 0 1 0 52 46"
            fill="none" stroke="currentColor" stroke-width="4"
            stroke-linecap="round"/>
      <!-- Inner C arc -->
      <path d="M44 24 A14 14 0 1 0 44 40"
            fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" opacity="0.55"/>
      <!-- Network node grid inside the C -->
      <circle cx="22" cy="22" r="2.4" fill="currentColor"/>
      <circle cx="32" cy="20" r="2.4" fill="currentColor"/>
      <circle cx="42" cy="22" r="2.4" fill="currentColor"/>
      <circle cx="22" cy="32" r="2.4" fill="currentColor"/>
      <circle cx="32" cy="32" r="3.2" fill="currentColor"/>
      <circle cx="42" cy="32" r="2.4" fill="currentColor"/>
      <circle cx="22" cy="42" r="2.4" fill="currentColor"/>
      <circle cx="32" cy="44" r="2.4" fill="currentColor"/>
      <circle cx="42" cy="42" r="2.4" fill="currentColor"/>
      <!-- Connector lines (faint) -->
      <g stroke="currentColor" stroke-width="0.8" opacity="0.35">
        <line x1="22" y1="22" x2="32" y2="20"/>
        <line x1="32" y1="20" x2="42" y2="22"/>
        <line x1="22" y1="22" x2="22" y2="32"/>
        <line x1="32" y1="20" x2="32" y2="32"/>
        <line x1="42" y1="22" x2="42" y2="32"/>
        <line x1="22" y1="32" x2="32" y2="32"/>
        <line x1="32" y1="32" x2="42" y2="32"/>
        <line x1="22" y1="32" x2="22" y2="42"/>
        <line x1="32" y1="32" x2="32" y2="44"/>
        <line x1="42" y1="32" x2="42" y2="42"/>
        <line x1="22" y1="42" x2="32" y2="44"/>
        <line x1="32" y1="44" x2="42" y2="42"/>
      </g>
    </symbol>

    <!-- ============================== BRAND PILLARS ============================== -->
    <!-- Target / Mission: concentric ring with centre dot -->
    <symbol id="ic-target" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="2.2" fill="currentColor"/>
    </symbol>

    <!-- Vision: telescope/eye hybrid (focused gaze) -->
    <symbol id="ic-vision" viewBox="0 0 24 24">
      <path d="M2 12 C5 5, 9 3, 12 3 C15 3, 19 5, 22 12 C19 19, 15 21, 12 21 C9 21, 5 19, 2 12 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="1" fill="currentColor"/>
    </symbol>

    <!-- Intelligence (book + circuit) -->
    <symbol id="ic-intelligence" viewBox="0 0 24 24">
      <path d="M4 5 C7 4, 10 5, 12 6 C14 5, 17 4, 20 5 L20 18 C17 17, 14 18, 12 19 C10 18, 7 17, 4 18 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="12" y1="6" x2="12" y2="19" stroke="currentColor" stroke-width="2"/>
      <circle cx="8" cy="9" r="0.9" fill="currentColor"/>
      <circle cx="16" cy="9" r="0.9" fill="currentColor"/>
      <line x1="8" y1="12" x2="11" y2="12" stroke="currentColor" stroke-width="1.4"/>
      <line x1="13" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.4"/>
    </symbol>

    <!-- Data: stacked disc / database stack -->
    <symbol id="ic-data" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="8" ry="2.6" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M4 5 V12 C4 13.4, 7.6 14.6, 12 14.6 C16.4 14.6, 20 13.4, 20 12 V5"
            fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M4 12 V19 C4 20.4, 7.6 21.6, 12 21.6 C16.4 21.6, 20 20.4, 20 19 V12"
            fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Network (for "expansion / wings") -->
    <symbol id="ic-network" viewBox="0 0 24 24">
      <circle cx="12" cy="4" r="2.2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="4" cy="20" r="2.2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="20" cy="20" r="2.2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="13" r="2.6" fill="currentColor"/>
      <line x1="12" y1="6.2" x2="12" y2="10.4" stroke="currentColor" stroke-width="2"/>
      <line x1="5.6" y1="18.4" x2="10.2" y2="14.6" stroke="currentColor" stroke-width="2"/>
      <line x1="18.4" y1="18.4" x2="13.8" y2="14.6" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Shield with checkmark (security) -->
    <symbol id="ic-shield-check" viewBox="0 0 24 24">
      <path d="M12 3 L20 6 V12 C20 17, 16 20.5, 12 21.5 C8 20.5, 4 17, 4 12 V6 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M8.5 12 L11 14.5 L15.5 9.5" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- ============================== FOCUS AREA ICONS ============================== -->
    <!-- Fintech / Mobile payments (hand + phone with wave) -->
    <symbol id="ic-fintech" viewBox="0 0 24 24">
      <rect x="6" y="2" width="12" height="20" rx="2.2"
            fill="none" stroke="currentColor" stroke-width="2"/>
      <line x1="6" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="2"/>
      <line x1="6" y1="18" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="20" r="0.6" fill="currentColor"/>
      <!-- payment wave inside screen -->
      <path d="M8.5 11 C9.5 10, 10.5 12, 12 11 C13.5 10, 14.5 12, 15.5 11"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8.5 14 C9.5 13, 10.5 15, 12 14 C13.5 13, 14.5 15, 15.5 14"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    </symbol>

    <!-- Strategy / Chess knight head (sleek) -->
    <symbol id="ic-strategy" viewBox="0 0 24 24">
      <path d="M18 6 C18 4.5, 16.5 3, 15 3 C13.5 3, 12 4, 12 5.5 C12 7, 13 8, 12 9
               C10 10.5, 7 11, 5 14 C3.4 16.4, 3 19, 4 21 L20 21 C21 19, 20.5 16, 19 14
               C18 12.5, 18 11, 18 9 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="15" cy="6" r="0.8" fill="currentColor"/>
    </symbol>

    <!-- Policy / Scales -->
    <symbol id="ic-policy" viewBox="0 0 24 24">
      <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="2"/>
      <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2"/>
      <path d="M4 6 L2 12 C2 13.5, 3.5 14.5, 5 14.5 C6.5 14.5, 8 13.5, 8 12 L6 6"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M20 6 L18 12 C18 13.5, 19.5 14.5, 21 14.5 C22.5 14.5, 24 13.5, 24 12 L22 6"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"
            transform="translate(-2,0)"/>
      <line x1="9" y1="21" x2="15" y2="21" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <!-- Research / Beaker -->
    <symbol id="ic-research" viewBox="0 0 24 24">
      <path d="M9 3 H15 M10 3 V9 L5 19 C4.5 20.4, 5.6 21.5, 7 21.5 H17
               C18.4 21.5, 19.5 20.4, 19 19 L14 9 V3"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="7" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.6" opacity="0.7"/>
      <circle cx="9.5" cy="17.5" r="0.7" fill="currentColor"/>
      <circle cx="13" cy="18.5" r="0.7" fill="currentColor" opacity="0.7"/>
    </symbol>

    <!-- Inclusion / Hand with people -->
    <symbol id="ic-inclusion" viewBox="0 0 24 24">
      <circle cx="8" cy="6" r="2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="16" cy="6" r="2" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="9" r="2.2" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M3 16 C3 13.5, 5 12, 8 12 C9.5 12, 10.5 12.5, 12 13.5
               C13.5 12.5, 14.5 12, 16 12 C19 12, 21 13.5, 21 16 V20 H3 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </symbol>

    <!-- Education / Graduation cap -->
    <symbol id="ic-education" viewBox="0 0 24 24">
      <path d="M2 9 L12 5 L22 9 L12 13 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M6 11 V16 C6 17.5, 8.5 18.5, 12 18.5 C15.5 18.5, 18 17.5, 18 16 V11"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="20" y1="9.5" x2="20" y2="15" stroke="currentColor" stroke-width="2"/>
      <circle cx="20" cy="16" r="0.8" fill="currentColor"/>
    </symbol>

    <!-- Incubation / Rocket (custom geometric) -->
    <symbol id="ic-rocket" viewBox="0 0 24 24">
      <path d="M12 2 C15 5, 17 9, 17 13 V19 H7 V13 C7 9, 9 5, 12 2 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="11" r="1.8" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M7 14 L4 17 V20 L7 19 M17 14 L20 17 V20 L17 19"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M10 19 L9 22 M12 19 L12 22 M14 19 L15 22"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </symbol>

    <!-- Consulting / Handshake (two interlocking shapes) -->
    <symbol id="ic-handshake" viewBox="0 0 24 24">
      <path d="M2 12 L6 8 L9 9 L11 7 L13 7 L15 9 L18 8 L22 12 L18 16 L15 15
               L13 17 L11 17 L9 15 L6 16 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="11" y1="12" x2="13" y2="12" stroke="currentColor" stroke-width="1.6" opacity="0.6"/>
    </symbol>

    <!-- ============================== CONTENT SECTION ICONS ============================== -->
    <!-- White paper / Document stack (research publication) -->
    <symbol id="ic-paper" viewBox="0 0 24 24">
      <path d="M6 3 H14 L18 7 V21 H6 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M14 3 V7 H18" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="9" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.6"/>
      <line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.6"/>
      <line x1="9" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.6"/>
    </symbol>

    <!-- Megaphone (call for papers) -->
    <symbol id="ic-megaphone" viewBox="0 0 24 24">
      <path d="M3 10 V14 L11 14 L19 18 V6 L11 10 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M11 14 V18 C11 19.5, 12 20, 13 19.5"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="19" y1="9" x2="22" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="19" y1="15" x2="22" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- Insights / Lightbulb (custom geometric) -->
    <symbol id="ic-lightbulb" viewBox="0 0 24 24">
      <path d="M12 3 C8 3, 5 6, 5 10 C5 12.5, 6.5 14.5, 8 15.5 V18 H16 V15.5
               C17.5 14.5, 19 12.5, 19 10 C19 6, 16 3, 12 3 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="9" y1="20" x2="15" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="22" x2="14" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- Award / Ribbon rosette -->
    <symbol id="ic-award" viewBox="0 0 24 24">
      <circle cx="12" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="9" r="2.4" fill="currentColor"/>
      <path d="M8 14 L6 22 L9 20 L12 22 L15 20 L18 22 L16 14"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </symbol>

    <!-- Infinity (continuous research) -->
    <symbol id="ic-infinity" viewBox="0 0 24 24">
      <path d="M3 12 C3 9, 6 7, 9 10 L15 14 C18 17, 21 15, 21 12 C21 9, 18 7, 15 10 L9 14 C6 17, 3 15, 3 12 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </symbol>

    <!-- Infinity with rolling arrow (rolling call) -->
    <symbol id="ic-rolling" viewBox="0 0 24 24">
      <path d="M3 12 C3 9, 6 7, 9 10 L15 14 C18 17, 21 15, 21 12 C21 9, 18 7, 15 10 L9 14 C6 17, 3 15, 3 12 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M19 4 L21.5 6.5 L19 9" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="21.5" y1="6.5" x2="16" y2="6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============================== SECTION DIVIDER ============================== -->
    <!-- Geometric SVG divider: layered chevron stripes -->
    <symbol id="ic-divider" viewBox="0 0 120 12" preserveAspectRatio="none">
      <line x1="0" y1="6" x2="48" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M54 2 L60 6 L54 10" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="66" cy="6" r="2" fill="currentColor"/>
      <path d="M72 2 L66 6 L72 10" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="78" y1="6" x2="120" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ============================== WINGS ============================== -->
    <symbol id="ic-wing-research" viewBox="0 0 24 24">
      <!-- Compass-rose meets research -->
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 4 L14 12 L12 20 L10 12 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M4 12 L12 10 L20 12 L12 14 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
    </symbol>

    <symbol id="ic-wing-intelligence" viewBox="0 0 24 24">
      <!-- Eye + horizon -->
      <path d="M2 12 C5 6, 9 4, 12 4 C15 4, 19 6, 22 12 C19 18, 15 20, 12 20 C9 20, 5 18, 2 12 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="12" cy="12" r="2.6" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>

    <symbol id="ic-wing-consultancy" viewBox="0 0 24 24">
      <!-- Speech bubble + chart -->
      <path d="M4 5 H20 V16 H10 L6 20 V16 H4 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="7" y1="13" x2="7" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="11" y1="13" x2="11" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="13" x2="15" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="ic-wing-publication" viewBox="0 0 24 24">
      <!-- Open book -->
      <path d="M3 6 C6 5, 9 5, 12 6 C15 5, 18 5, 21 6 V18 C18 17, 15 17, 12 18 C9 17, 6 17, 3 18 Z"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <line x1="12" y1="6" x2="12" y2="18" stroke="currentColor" stroke-width="2"/>
      <line x1="6" y1="9" x2="10" y2="9" stroke="currentColor" stroke-width="1.4"/>
      <line x1="14" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.4"/>
    </symbol>

  </defs>
</svg>
